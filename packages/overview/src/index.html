<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="var(--bg, #0d0d0d)" />
    <title>__SERVER_NAME__</title>
    <style>
      __CSS__
    </style>
    <script src="config.js"></script>
  </head>
  <body>
    <div class="c">
      <h1>__SERVER_NAME__</h1>
      <p class="sub">Devbox</p>
      <p id="user" class="sub"></p>
      <div class="card">
        <div class="hdr">
          <span class="ttl">Auto-shutdown</span>
          <div class="ind">
            <div id="d" class="dot" role="status" aria-label="Server status indicator"></div>
            <span id="s">Active</span>
          </div>
        </div>
        <div id="cd" aria-live="polite">--:--</div>
        <div class="lbl">until idle shutdown</div>
      </div>
      <nav class="svcs" id="svcs" aria-label="Services"></nav>
      <div class="card" id="guestcard" style="margin-top: 1rem">
        <div class="hdr">
          <span class="ttl">Guest Access</span>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem">
          <input
            id="gname"
            type="text"
            placeholder="Name (optional)"
            style="
              flex: 1;
              background: var(--muted, #262626);
              color: var(--fg, #f5f5f5);
              border: 1px solid var(--border, #333);
              border-radius: 0.375rem;
              padding: 0.5rem;
              font-size: 0.875rem;
            "
          />
        </div>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem">
          <select
            id="gdur"
            style="
              flex: 1;
              background: var(--muted, #262626);
              color: var(--fg, #f5f5f5);
              border: 1px solid var(--border, #333);
              border-radius: 0.375rem;
              padding: 0.5rem;
              font-size: 0.875rem;
            "
          >
            <option value="60">1 hour</option>
            <option value="240">4 hours</option>
            <option value="480">8 hours</option>
            <option value="960">16 hours</option>
          </select>
          <button
            id="gbtn"
            type="button"
            style="
              background: var(--muted, #262626);
              color: var(--fg, #f5f5f5);
              border: 1px solid var(--border, #333);
              border-radius: 0.375rem;
              padding: 0.5rem 1rem;
              font-size: 0.875rem;
              cursor: pointer;
            "
          >
            Generate
          </button>
        </div>
        <div id="guests"></div>
      </div>
    </div>
    <script>
      __JS__;
    </script>
  </body>
</html>
